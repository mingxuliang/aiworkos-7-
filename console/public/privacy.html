  <body>
    <h1>AI Work OS 隐私政策</h1>
    <p class="muted">最后更新：2026-07-08</p>
    <p>
      我们重视您的个人信息与业务数据安全。本政策说明 AI Work OS 在账号认证、会话记录、文件存储与模型调用过程中
      可能收集和使用的信息类型。
    </p>
    <p>
      账号信息（如用户名、角色）用于身份认证与权限控制；会话与操作日志用于故障排查、安全审计与产品改进；
      上传文件与知识库内容按企业配置存储于受控基础设施（如 MinIO、数据库）。
    </p>
    <p>
      除法律法规要求或经您授权的情况外，我们不会向无关第三方出售您的个人数据。您可通过企业管理员申请查阅、
      更正或删除相关数据。
    </p>
    <p class="muted">完整版隐私政策可由企业管理员另行提供或替换本页面内容。</p>
  </body>
